name: Build Android APK

on:
  push:
    branches: [ "main" ] # Targeting main branch from now on
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # Use Java 17 as recommended

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info # Added --stacktrace and --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: floating-flashcards-apk
        path: app/build/outputs/apk/debug/app-debug.apk
